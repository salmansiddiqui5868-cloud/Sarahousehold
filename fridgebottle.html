
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge Bottle</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🥤 Fridge Bottle</h1>

<div class="card">

<img id="productImage"
src="bottle.jpg"
alt="Fridge Bottle">

<h2>Fridge Bottle</h2>

<p id="price">₹99</p>

<div class="qty-box">

<button id="minus">−</button>

<span id="qty">1</span>

<button id="plus">+</button>

</div>

<p id="total">
Total : ₹99
</p>


<a id="orderBtn" class="btn" href="#">
💬 Order on WhatsApp
</a>

</div>

<a class="btn" href="bottles.html">
⬅ Back to Water Bottles
</a>

<div class="footer">
Sarahousehold
</div>

</div>
  <script src="script.js"></script>
<script>

let qty = 1;
const price = 99;

const qtyText = document.getElementById("qty");
const totalText = document.getElementById("total");

document.getElementById("plus").onclick = function () {
    qty++;
    update();
};

document.getElementById("minus").onclick = function () {
    if (qty > 0) {
        qty--;
        update();
    }
};

function update() {
    qtyText.innerHTML = qty;
    totalText.innerHTML = "Total : ₹" + (qty * price);

    document.getElementById("orderBtn").href =
    "https://wa.me/918446429045?text=" +
    encodeURIComponent(
`🛍️ Sarahousehold Order

📦 Product : Fridge Bottle
🔢 Quantity : ${qty}
💰 Price : ₹${price}
💵 Total : ₹${qty * price}

🖼️ Image :
https://salmansiddiqui5868-cloud.github.io/Sarahousehold/bottle.jpg

📄 Product Page :
https://salmansiddiqui5868-cloud.github.io/Sarahousehold/fridgebottle.html`
    );
}
if (qty == 0){
document.getElementById("cartBtn").disabled = true;
document.getElementById("orderBtn").style.display = "none";
}else{
document.getElementById("cartBtn").disabled = false;
document.getElementById("orderBtn").style.display = "block";
}
update();

</script>
</body>
</html>
