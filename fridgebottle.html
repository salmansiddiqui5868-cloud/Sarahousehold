
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge Bottle</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:18px;
box-shadow:0 0 20px rgba(212,175,55,.3);
text-align:center;
margin-bottom:20px;
}

h1{
color:#d4af37;
text-align:center;
margin-bottom:20px;
}

img{
width:180px;
border-radius:10px;
margin:10px 0;
}

.btn{
display:block;
text-decoration:none;
background:#d4af37;
color:#111;
padding:15px;
margin-top:15px;
border-radius:10px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
color:#888;
}
  .qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:20px 0;
}

.qty-box button{
width:45px;
height:45px;
border:none;
border-radius:10px;
background:#d4af37;
color:#111;
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.qty-box span{
font-size:22px;
font-weight:bold;
color:#fff;
min-width:30px;
text-align:center;
}

#productImage{
width:200px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

#productImage:hover{
transform:scale(1.05);
}

#total{
font-size:20px;
font-weight:bold;
color:#d4af37;
margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🥤 Fridge Bottle</h1>

<div class="card">

<img id="productImage"
src="bottle.jpg"
alt="Fridge Bottle">

<h2>Fridge Bottle</h2>

<p id="price">₹99</p>

<div class="qty-box">

<button id="minus">−</button>

<span id="qty">1</span>

<button id="plus">+</button>

</div>

<p id="total">
Total : ₹99
</p>

<button id="cartBtn" class="btn">
🛒 Add To Cart
</button>

<a id="orderBtn" class="btn" href="#">
💬 Order on WhatsApp
</a>

</div>

<a class="btn" href="bottles.html">
⬅ Back to Water Bottles
</a>

<div class="footer">
Sarahousehold
</div>

</div>
<script>

let qty = 1;
const price = 99;

const qtyText = document.getElementById("qty");
const totalText = document.getElementById("total");

document.getElementById("plus").onclick = function () {
    qty++;
    update();
};

document.getElementById("minus").onclick = function () {
    if (qty > 1) {
        qty--;
        update();
    }
};

function update() {
    qtyText.innerHTML = qty;
    totalText.innerHTML = "Total : ₹" + (qty * price);

    document.getElementById("orderBtn").href =
    "https://wa.me/918446429045?text=" +
    encodeURIComponent(
`🛍️ Sarahousehold Order

📦 Product : Fridge Bottle
🔢 Quantity : ${qty}
💰 Price : ₹${price}
💵 Total : ₹${qty * price}

🖼️ Image :
https://salmansiddiqui5868-cloud.github.io/Sarahousehold/bottle.jpg

📄 Product Page :
https://salmansiddiqui5868-cloud.github.io/Sarahousehold/fridgebottle.html`
    );
}

update();

</script>
</body>
</html>
